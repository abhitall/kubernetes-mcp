---
# Namespace for the API proxy
apiVersion: v1
kind: Namespace
metadata:
  name: k8s-mcp-proxy
  labels:
    app.kubernetes.io/name: k8s-api-proxy
    app.kubernetes.io/part-of: kubernetes-mcp-server
---
# ServiceAccount with RBAC for API access
apiVersion: v1
kind: ServiceAccount
metadata:
  name: k8s-api-proxy
  namespace: k8s-mcp-proxy
  labels:
    app.kubernetes.io/name: k8s-api-proxy
---
# ClusterRole granting read access to all resources
# Adjust verbs if you need write access for self-healing
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: k8s-api-proxy
  labels:
    app.kubernetes.io/name: k8s-api-proxy
rules:
  # Core API resources — read + limited write for self-heal
  - apiGroups: [""]
    resources:
      - pods
      - pods/log
      - pods/status
      - pods/eviction
      - services
      - nodes
      - nodes/status
      - namespaces
      - events
      - configmaps
      - secrets
      - replicationcontrollers
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Apps API
  - apiGroups: ["apps"]
    resources:
      - deployments
      - deployments/scale
      - replicasets
      - statefulsets
      - daemonsets
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Batch API
  - apiGroups: ["batch"]
    resources:
      - jobs
      - cronjobs
    verbs: ["get", "list", "watch"]
  # Version API (for health checks)
  - nonResourceURLs: ["/version", "/healthz", "/readyz"]
    verbs: ["get"]
  # Custom resources (generic access)
  - apiGroups: ["*"]
    resources: ["*"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: k8s-api-proxy
  labels:
    app.kubernetes.io/name: k8s-api-proxy
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: k8s-api-proxy
subjects:
  - kind: ServiceAccount
    name: k8s-api-proxy
    namespace: k8s-mcp-proxy
---
# Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: k8s-api-proxy
  namespace: k8s-mcp-proxy
  labels:
    app.kubernetes.io/name: k8s-api-proxy
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: k8s-api-proxy
  template:
    metadata:
      labels:
        app.kubernetes.io/name: k8s-api-proxy
    spec:
      serviceAccountName: k8s-api-proxy
      automountServiceAccountToken: true
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: proxy
          image: k8s-api-proxy:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8443
              name: http
              protocol: TCP
          env:
            - name: PROXY_LISTEN
              value: ":8443"
            - name: PROXY_READ_ONLY
              value: "false"
            # Optional: set a shared secret to restrict access
            # - name: PROXY_AUTH_TOKEN
            #   valueFrom:
            #     secretKeyRef:
            #       name: k8s-api-proxy-auth
            #       key: token
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 100m
              memory: 64Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
---
# Service (ClusterIP by default; use LoadBalancer or Ingress for external access)
apiVersion: v1
kind: Service
metadata:
  name: k8s-api-proxy
  namespace: k8s-mcp-proxy
  labels:
    app.kubernetes.io/name: k8s-api-proxy
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: k8s-api-proxy
  ports:
    - port: 8443
      targetPort: http
      protocol: TCP
      name: http
---
# Optional: NetworkPolicy to restrict who can reach the proxy
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: k8s-api-proxy
  namespace: k8s-mcp-proxy
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: k8s-api-proxy
  policyTypes:
    - Ingress
  ingress:
    # Allow traffic from any namespace with the label
    # mcp-proxy-access: "true"
    - from:
        - namespaceSelector:
            matchLabels:
              mcp-proxy-access: "true"
      ports:
        - port: 8443
          protocol: TCP
