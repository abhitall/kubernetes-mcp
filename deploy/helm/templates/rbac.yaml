{{- if .Values.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "kubernetes-mcp-server.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kubernetes-mcp-server.labels" . | nindent 4 }}
{{- end }}
---
{{- if .Values.rbac.create -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "kubernetes-mcp-server.fullname" . }}
  labels:
    {{- include "kubernetes-mcp-server.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: [pods, pods/log, pods/status, pods/eviction, services, endpoints,
                configmaps, secrets, events, nodes, nodes/status, namespaces,
                persistentvolumeclaims, persistentvolumes, replicationcontrollers]
    verbs: [get, list, watch]
  - apiGroups: [""]
    resources: [pods, pods/eviction, nodes]
    verbs: [create, update, patch, delete]
  - apiGroups: [apps]
    resources: [deployments, deployments/scale, replicasets, statefulsets, daemonsets]
    verbs: [get, list, watch, create, update, patch, delete]
  - apiGroups: [batch]
    resources: [jobs, cronjobs]
    verbs: [get, list, watch, create, update, patch, delete]
  - apiGroups: [networking.k8s.io]
    resources: [ingresses, networkpolicies]
    verbs: [get, list, watch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "kubernetes-mcp-server.fullname" . }}
  labels:
    {{- include "kubernetes-mcp-server.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "kubernetes-mcp-server.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "kubernetes-mcp-server.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
