apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "kubernetes-mcp-server.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kubernetes-mcp-server.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "kubernetes-mcp-server.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "kubernetes-mcp-server.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "kubernetes-mcp-server.serviceAccountName" . }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: mcp-server
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.server.port }}
              protocol: TCP
          env:
            - name: MCP_SERVER_HOST
              value: {{ .Values.server.host | quote }}
            - name: MCP_SERVER_PORT
              value: {{ .Values.server.port | quote }}
            - name: MCP_TRANSPORT
              value: {{ .Values.server.transport | quote }}
            - name: MCP_LOG_LEVEL
              value: {{ .Values.server.logLevel | quote }}
            - name: READ_ONLY
              value: {{ .Values.server.readOnly | quote }}
            - name: ENABLE_RCA
              value: {{ .Values.features.enableRCA | quote }}
            - name: ENABLE_SELF_HEAL
              value: {{ .Values.features.enableSelfHeal | quote }}
            - name: CLUSTER_REGISTRY
              valueFrom:
                secretKeyRef:
                  name: {{ include "kubernetes-mcp-server.fullname" . }}-config
                  key: CLUSTER_REGISTRY
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "kubernetes-mcp-server.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kubernetes-mcp-server.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "kubernetes-mcp-server.selectorLabels" . | nindent 4 }}
