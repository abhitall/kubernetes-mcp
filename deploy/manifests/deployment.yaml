apiVersion: apps/v1
kind: Deployment
metadata:
  name: kubernetes-mcp-server
  namespace: kubernetes-mcp
  labels:
    app.kubernetes.io/name: kubernetes-mcp-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: kubernetes-mcp-server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kubernetes-mcp-server
    spec:
      serviceAccountName: kubernetes-mcp-server
      containers:
        - name: mcp-server
          image: kubernetes-mcp-server:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: MCP_SERVER_HOST
              value: "0.0.0.0"
            - name: MCP_SERVER_PORT
              value: "8080"
            - name: MCP_TRANSPORT
              value: "streamable-http"
            - name: MCP_LOG_LEVEL
              value: "info"
            - name: ENABLE_SELF_HEAL
              value: "true"
            - name: ENABLE_RCA
              value: "true"
            - name: READ_ONLY
              value: "false"
            - name: CLUSTER_REGISTRY
              valueFrom:
                secretKeyRef:
                  name: kubernetes-mcp-config
                  key: CLUSTER_REGISTRY
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: kubernetes-mcp-server
  namespace: kubernetes-mcp
  labels:
    app.kubernetes.io/name: kubernetes-mcp-server
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: kubernetes-mcp-server
