apiVersion: v1
kind: Secret
metadata:
  name: kubernetes-mcp-config
  namespace: kubernetes-mcp
  labels:
    app.kubernetes.io/name: kubernetes-mcp-server
type: Opaque
stringData:
  # JSON array of cluster configurations
  # Each entry connects the MCP server to a target cluster
  CLUSTER_REGISTRY: |
    [
      {
        "name": "local",
        "flavor": "vanilla",
        "api_server": "https://kubernetes.default.svc",
        "sa_token_path": "/var/run/secrets/kubernetes.io/serviceaccount/token",
        "ca_cert_path": "/var/run/secrets/kubernetes.io/serviceaccount/ca.crt"
      }
    ]
